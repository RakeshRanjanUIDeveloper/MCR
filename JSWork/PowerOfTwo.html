<body>
    <script>
        function isPowerOfTwo(n) {
            //return Number.isInteger(Math.log2(n))
            if (n<=0) return false;
            return (n & (n-1)) === 0;

        }
        console.log(isPowerOfTwo(16));
        console.log(isPowerOfTwo(9));
    </script>
