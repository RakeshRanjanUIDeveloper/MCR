<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>

<body>
    <script>
        function decodeSecretCode(s) {
            let result = "";

            for (let i = 0; i < s.length; i += 2) {
                const letter = s[i];
                const shift = parseInt(s[i + 1], 10);

                // Shift using ASCII values
                const decodedChar = String.fromCharCode(letter.charCodeAt(0) + shift);
                result += decodedChar;
            }

            return result;
        }
        console.log(decodeSecretCode("a2b3c1"));
    </script>
</body>

</html>
